name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      S3_ENDPOINT: http://127.0.0.1:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: egit-test
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # MinIO as an S3-compatible object store. Run via docker (so we can pass the
      # `server /data` command, which GitHub `services:` can't) and wait for ready.
      - name: Start MinIO
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=$S3_ACCESS_KEY -e MINIO_ROOT_PASSWORD=$S3_SECRET_KEY \
            minio/minio server /data
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:9000/minio/health/ready >/dev/null 2>&1; then
              echo "MinIO ready"; break
            fi
            echo "waiting for MinIO ($i)"; sleep 2
          done

      - run: npm ci

      # dist/sw.js is COMMITTED (no `prepare`: git-dep installs run it in an
      # isolated clone where devDependencies' binaries are unreliable — a global
      # `npm i -g github:…` died on `esbuild: command not found`). Guard that
      # the committed bundle never drifts from the source.
      - name: dist/sw.js is up to date
        run: |
          npm run build
          git diff --exit-code dist/sw.js

      # Node test suites: object-store harness, core, cli remote helper,
      # smart-HTTP vs real git, package consumability.
      - name: Unit + integration tests (node --test)
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Browser (service worker) + interop scenarios.
      - name: E2E tests (Playwright)
        run: npm run test:e2e

      - name: MinIO logs (on failure)
        if: failure()
        run: docker logs minio || true

  # Auto-publish to npm when a version bump lands on main: merging a release PR
  # IS the release. Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret;
  # npmjs.com package settings must list this repo + workflow (ci.yml) as a
  # trusted publisher. Provenance attestation comes automatically with OIDC.
  publish:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC exchange with npm
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # Trusted publishing needs npm >= 11.5.1.
      - run: npm install -g npm@latest

      - name: Publish when package.json is ahead of the registry
        run: |
          NAME=$(node -p "require('./package.json').name")
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "$NAME" version 2>/dev/null || echo none)
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "$NAME@$LOCAL already published — nothing to do"
            exit 0
          fi
          echo "publishing $NAME@$LOCAL (registry has $PUBLISHED)"
          npm publish
